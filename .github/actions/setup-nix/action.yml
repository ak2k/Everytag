name: Set up Nix with cached store
description: |
  Install Nix, restore /nix/store from GHA cache (keyed to flake.lock +
  west2nix.toml), and configure the shared Cachix substituter.

  Layered read order: local Nix store → GHA cache → Cachix → build from
  source. Post-job saves the store back to GHA cache on a fresh key.

inputs:
  cachix-auth-token:
    description: Token for cachix-action (optional; pull-only if omitted)
    required: false
  cache-scope:
    description: |
      Suffix appended to the cache key so each job type gets its own cache.
      Without this, fast jobs (lint, cppcheck) win the first-writer-wins
      save race with their tiny /nix/store, leaving firmware builds to fall
      back to Cachix for the whole toolchain. Pass github.job for per-job
      scoping (the workflow must set this; it is not available as a default
      inside a composite action's input).
    required: false
    default: default

runs:
  using: composite
  steps:
    - uses: cachix/install-nix-action@v31

    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ inputs.cache-scope }}-${{ hashFiles('flake.lock', 'west2nix.toml') }}
        restore-prefixes-first-match: |
          nix-${{ runner.os }}-${{ inputs.cache-scope }}-
          nix-${{ runner.os }}-
        gc-max-store-size-linux: 5368709120 # 5 GB per scope
        purge: true
        purge-prefixes: nix-${{ runner.os }}-${{ inputs.cache-scope }}-
        purge-created: 604800 # 7 days

    - uses: cachix/cachix-action@v17
      with:
        name: ak2k
        authToken: ${{ inputs.cachix-auth-token }}
