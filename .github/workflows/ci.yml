name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit hits the same ref (branch or PR)
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Required by cache-nix-action to purge old caches
permissions:
  actions: write
  contents: read

jobs:
  host-tests:
    name: Host tests (ASan/UBSan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cache-scope: ${{ github.job }}
      - name: Build and run tests
        run: nix run .#test

  ble-client-tests:
    name: BLE client tests (Bumble)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cache-scope: ${{ github.job }}
      - name: Run Bumble BLE client tests
        run: nix run .#test-ble

  clang-format:
    name: clang-format check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cache-scope: ${{ github.job }}
      - name: Check formatting
        run: nix run .#lint

  # All shipping firmware variants. Nix's mkFirmware invokes cmake the same
  # way `west build` does, so Nix coverage subsumes west-build coverage.
  build:
    name: Build ${{ matrix.pkg }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        pkg:
          - firmware-nrf52810
          - firmware-nrf52832
          - firmware-nrf52833
          - firmware-nrf52840
          - firmware-nrf54l15
          - firmware-thingy52
          - firmware-nrf52832-dfu
          - firmware-nrf52833-dfu
          - firmware-nrf52840-dfu
          - firmware-nrf54l15-dfu
          - firmware-thingy52-dfu
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          # Shared with release.yml's build, so firmware cache is reused
          # across both workflows. All firmware variants share ~90% of
          # their /nix/store (toolchain, NCS modules, west-deps).
          cache-scope: build
      - name: Build ${{ matrix.pkg }}
        run: |
          nix build .#${{ matrix.pkg }} -L
          cat result/size.txt

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Override the workflow-level permissions to add security-events: write
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          queries: security-and-quality

      - name: Build for CodeQL
        run: |
          cd tests/host
          cmake -B build \
            -DCMAKE_CXX_COMPILER=g++ \
            -DCMAKE_C_COMPILER=gcc
          cmake --build build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cache-scope: ${{ github.job }}
      - name: Run cppcheck
        run: nix run .#cppcheck
