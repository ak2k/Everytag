name: BabbleSim BLE Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Required by cache-nix-action to purge old caches
permissions:
  actions: write
  contents: read

concurrency:
  group: bsim-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bsim-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-nix
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build and run BabbleSim tests
        run: nix build .#bsim-test -L

      - name: Show test output (useful when result was pulled from cache)
        if: always()
        run: |
          DRV=$(nix path-info --derivation .#bsim-test)
          echo "::group::BabbleSim test log"
          nix log "$DRV" | tail -100
          echo "::endgroup::"
