# Thread analyzer overlay for bsim BLE adv + connection cycles.
# Reports stack high-water mark per thread; flag if any thread <20% headroom.
#
# Usage: applied automatically when the bsim-test derivation includes this
# overlay file. See plan §1g step 3 (runtime stack verification).

CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y
CONFIG_THREAD_ANALYZER_RUN_UNLOCKED=y
CONFIG_THREAD_ANALYZER_AUTO_INTERVAL=10
CONFIG_THREAD_NAME=y
